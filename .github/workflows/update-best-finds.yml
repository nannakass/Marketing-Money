name: Update Best Finds

on:
  schedule:
    - cron: '0 9 * * 0'   # Every Sunday at 9am UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  update-products:
    runs-on: ubuntu-latest

    steps:
      - name: Check for API credentials
        run: |
          if [ -z "${{ secrets.AMAZON_ACCESS_KEY }}" ]; then
            echo "⚠️  AMAZON_ACCESS_KEY not set — skipping update."
            echo "Add your Amazon PA API credentials in Settings → Secrets to activate this workflow."
            exit 0
          fi

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Fetch and update Best Finds
        env:
          AMAZON_ACCESS_KEY: ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY: ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_PARTNER_TAG: ${{ secrets.AMAZON_PARTNER_TAG }}
        run: node scripts/update-best-finds.js

      - name: Commit and push if changed
        run: |
          git config user.email "nannasbiz1@gmail.com"
          git config user.name "Nanna's Home Finds Bot"
          git add index.html
          git diff --staged --quiet && echo "No changes to commit." || \
            git commit -m "Auto-update: Best Finds refreshed $(date +'%Y-%m-%d')" && \
            git push origin main
